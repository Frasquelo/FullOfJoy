<!--
  COMPONENTE FAQ — FullOfJoy ASD
  ================================
  Uso nel build system:
    Nel file .json della pagina, aggiungi un array "faq":
      "faq": [
        { "q": "Domanda uno?", "a": "Risposta uno." },
        { "q": "Domanda due?", "a": "Risposta due." }
      ]
    build.js genera automaticamente:
      1. Questo HTML <section> con <details>/<summary>
      2. Il JSON-LD FAQPage nel <head>

  Uso manuale (copy-paste):
    Copia la sezione sottostante nella pagina e sostituisci i placeholder.
    Aggiungi poi manualmente il JSON-LD FAQPage nel <head>.

  Regole contenuto:
    - Solo domande che il pubblico target fa davvero
    - Risposte brevi (2-4 frasi), in linguaggio semplice
    - Non usare FAQPage JSON-LD se le FAQ non sono visibili in pagina
    - Non aggiungere recensioni fittizie nelle FAQ
-->

<!-- FAQ JSON-LD — inserito da build.js nel <head> se faq[] è compilato
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "FAQPage",
  "mainEntity": [
    {
      "@type": "Question",
      "name": "{{FAQ_1_DOMANDA}}",
      "acceptedAnswer": { "@type": "Answer", "text": "{{FAQ_1_RISPOSTA}}" }
    },
    {
      "@type": "Question",
      "name": "{{FAQ_2_DOMANDA}}",
      "acceptedAnswer": { "@type": "Answer", "text": "{{FAQ_2_RISPOSTA}}" }
    }
  ]
}
</script>
-->

<section class="section section--alt" id="sez-faq">
  <div class="container" style="max-width:820px">
    <div class="center">
      <span class="eyebrow">FAQ</span>
      <h2>{{FAQ_SECTION_TITLE}}</h2>
      <!-- Es: "Domande frequenti sul puppy training" -->
    </div>
    <div class="faq" style="margin-top:32px">

      <details>
        <summary>{{FAQ_1_DOMANDA}}</summary>
        <div class="faq-body">{{FAQ_1_RISPOSTA}}</div>
      </details>

      <details>
        <summary>{{FAQ_2_DOMANDA}}</summary>
        <div class="faq-body">{{FAQ_2_RISPOSTA}}</div>
      </details>

      <details>
        <summary>{{FAQ_3_DOMANDA}}</summary>
        <div class="faq-body">{{FAQ_3_RISPOSTA}}</div>
      </details>

      <!-- Aggiungi altri <details> se necessario. Max 5-6 per pagina. -->

    </div>
    <div class="center" style="margin-top:28px">
      <a href="{{ROOT}}contatti.html" class="btn btn--ghost">
        Non hai trovato la risposta? Scrivici
      </a>
    </div>
  </div>
</section>
